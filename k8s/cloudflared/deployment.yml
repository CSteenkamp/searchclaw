apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: searchclaw
  labels:
    app: cloudflared
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          envFrom:
            - secretRef:
                name: cloudflared-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-secrets
  namespace: searchclaw
type: Opaque
stringData:
  TUNNEL_TOKEN: "your-tunnel-token-here"
