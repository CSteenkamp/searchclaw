apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dataclaw

resources:
  - ../../base

images:
  - name: dataclaw/api
    newName: ghcr.io/csteenkamp/dataclaw-api
    newTag: latest
  - name: dataclaw/worker
    newName: ghcr.io/csteenkamp/dataclaw-worker
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: api-gateway
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-gateway
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: api
                resources:
                  requests:
                    cpu: 500m
                    memory: 512Mi
                  limits:
                    cpu: "2"
                    memory: 1Gi

  - target:
      kind: Deployment
      name: searxng
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: searxng
      spec:
        replicas: 8
        template:
          spec:
            containers:
              - name: searxng
                resources:
                  requests:
                    cpu: 200m
                    memory: 256Mi
                  limits:
                    cpu: "1"
                    memory: 1Gi

  - target:
      kind: Deployment
      name: worker
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: worker
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: worker
                resources:
                  requests:
                    cpu: "1"
                    memory: 2Gi
                  limits:
                    cpu: "4"
                    memory: 4Gi
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: worker
                      topologyKey: kubernetes.io/hostname

  - target:
      kind: HorizontalPodAutoscaler
      name: api-gateway
    patch: |
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: api-gateway
      spec:
        minReplicas: 3
        maxReplicas: 12
