apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: searchclaw
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api
          image: searchclaw/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: searchclaw-secrets
            - configMapRef:
                name: searchclaw-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
